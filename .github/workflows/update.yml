name: Weekly Update

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Needed to commit updated files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch current demonlist
        run: python scripts/fetch_listed.py

      - name: Fetch position history (incremental)
        run: python scripts/fetch_history.py

      - name: Rebuild index.html
        run: python scripts/build.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/demons_listed.json demons_history.json index.html
          # Only commit if something actually changed
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: weekly data update $(date -u '+%Y-%m-%d')"
          git push
